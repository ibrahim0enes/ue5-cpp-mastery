<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UE5 C++ Mastery — Kimlik Terminali</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0E14;
    --bg-grid:#141A26;
    --panel:#121722;
    --panel-2:#171E2C;
    --line:#242C3D;
    --line-soft:#1B2130;
    --text:#ECE9E2;
    --muted:#8891A3;
    --muted-2:#5C6478;
    --amber:#F2A03D;
    --amber-dim:#8A6528;
    --green:#3ECF8E;
    --red:#E2694B;
    --blue:#5B8DEF;
    --purple:#9C7BE0;
    --radius:10px;
    --mono: 'IBM Plex Mono', ui-monospace, monospace;
    --sans: 'IBM Plex Sans', -apple-system, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(242,160,61,0.08), transparent 60%),
      repeating-linear-gradient(0deg, var(--bg-grid) 0 1px, transparent 1px 44px),
      repeating-linear-gradient(90deg, var(--bg-grid) 0 1px, transparent 1px 44px),
      var(--bg);
    color:var(--text);
    font-family:var(--sans);
    line-height:1.5;
    min-height:100vh;
    padding: 28px 16px 80px;
  }
  .wrap{max-width:920px;margin:0 auto;}
  a{color:var(--amber);}

  /* ---------- Header ---------- */
  header.top{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:26px;flex-wrap:wrap;}
  .kicker{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--muted-2);text-transform:uppercase;}
  h1.wordmark{font-family:var(--mono);font-size:clamp(20px,4vw,26px);font-weight:600;margin:2px 0 0;letter-spacing:-0.01em;}
  h1.wordmark span{color:var(--amber);}
  .top-right{font-family:var(--mono);font-size:11px;color:var(--muted-2);text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
  .lang-toggle{
    font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.04em;
    background:transparent;color:var(--amber);border:1px solid var(--amber-dim);
    border-radius:20px;padding:5px 12px;cursor:pointer;transition:all .15s;
  }
  .lang-toggle:hover{background:rgba(242,160,61,.08);border-color:var(--amber);}

  /* ---------- Identity Card ---------- */
  .id-card{
    background:linear-gradient(165deg, var(--panel-2), var(--panel));
    border:1px solid var(--line);
    border-radius:calc(var(--radius) + 4px);
    padding:26px;
    display:grid;
    grid-template-columns: 132px 1fr;
    gap:26px;
    position:relative;
    overflow:hidden;
    margin-bottom:18px;
  }
  .id-card::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(90deg, var(--amber) 0%, transparent 2px);
    background-size:100% 100%;
    opacity:.03;
  }
  .id-card .corner{position:absolute;width:16px;height:16px;border-color:var(--amber-dim);opacity:.6;}
  .id-card .corner.tl{top:10px;left:10px;border-top:2px solid;border-left:2px solid;}
  .id-card .corner.tr{top:10px;right:10px;border-top:2px solid;border-right:2px solid;}
  .id-card .corner.bl{bottom:10px;left:10px;border-bottom:2px solid;border-left:2px solid;}
  .id-card .corner.br{bottom:10px;right:10px;border-bottom:2px solid;border-right:2px solid;}

  .badge-slot{display:flex;align-items:center;justify-content:center;}
  .badge-slot svg{width:120px;height:120px;filter:drop-shadow(0 0 14px var(--badge-glow, rgba(242,160,61,.25)));}

  .id-main{min-width:0;}
  .id-row1{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:2px;}
  .name-input{
    background:transparent;border:none;border-bottom:1px dashed var(--line);
    color:var(--text);font-family:var(--sans);font-weight:600;font-size:19px;
    padding:2px 2px 4px;min-width:120px;max-width:260px;
  }
  .name-input:focus{outline:none;border-bottom-color:var(--amber);}
  .tier-pill{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;color:var(--bg);
    background:var(--amber);padding:3px 8px;border-radius:20px;font-weight:600;white-space:nowrap;
  }
  .rank-title{font-size:clamp(21px,3.4vw,27px);font-weight:700;margin:4px 0 2px;letter-spacing:-.01em;}
  .rank-desc{color:var(--muted);font-size:13.5px;margin:0 0 14px;}

  .xp-row{display:flex;align-items:baseline;gap:8px;font-family:var(--mono);margin-bottom:8px;flex-wrap:wrap;}
  .xp-num{font-size:30px;font-weight:700;color:var(--amber);}
  .xp-max{font-size:15px;color:var(--muted-2);}
  .xp-next{margin-left:auto;font-size:11.5px;color:var(--muted);}

  .prog-outer{position:relative;height:10px;background:var(--line-soft);border-radius:6px;overflow:visible;margin-bottom:10px;}
  .prog-fill{height:100%;border-radius:6px;background:linear-gradient(90deg, var(--amber-dim), var(--amber));transition:width .5s cubic-bezier(.22,.9,.3,1);}
  .prog-ticks{position:absolute;inset:0;display:flex;justify-content:space-between;pointer-events:none;}
  .prog-ticks i{width:2px;height:14px;margin-top:-2px;background:var(--bg);opacity:.9;}

  .tier-dots{display:flex;gap:6px;flex-wrap:wrap;}
  .tier-dot{
    width:9px;height:9px;border-radius:50%;border:1.5px solid var(--line);
    background:transparent;
  }
  .tier-dot.done{background:var(--amber);border-color:var(--amber);}
  .tier-dot.current{border-color:var(--amber);box-shadow:0 0 0 3px rgba(242,160,61,.18);}

  /* ---------- Badges strip ---------- */
  .badges-strip{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:26px;}
  .badge-chip{
    display:flex;align-items:center;gap:6px;
    border:1px solid var(--line);background:var(--panel);
    border-radius:20px;padding:6px 12px 6px 8px;font-size:12.5px;color:var(--muted-2);
    cursor:default;user-select:none;transition:all .2s;
  }
  .badge-chip .dot{width:7px;height:7px;border-radius:50%;background:var(--line);flex:none;}
  .badge-chip.earned{color:var(--text);border-color:var(--amber-dim);background:rgba(242,160,61,.06);}
  .badge-chip.earned .dot{background:var(--amber);box-shadow:0 0 6px var(--amber);}
  .badge-chip.self{cursor:pointer;}
  .badge-chip.self:hover{border-color:var(--muted);}

  /* ---------- Section boards ---------- */
  .section-board{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    margin-bottom:14px;overflow:hidden;
  }
  .section-head{
    display:flex;align-items:center;gap:14px;padding:16px 18px;cursor:pointer;user-select:none;
  }
  .section-icon{font-size:22px;flex:none;width:30px;text-align:center;}
  .section-titles{flex:1;min-width:0;}
  .section-titles h3{margin:0;font-size:15.5px;font-weight:600;}
  .section-titles p{margin:2px 0 0;font-size:12px;color:var(--muted);}
  .section-meta{text-align:right;flex:none;font-family:var(--mono);}
  .section-xp{font-size:13.5px;color:var(--amber);font-weight:600;}
  .section-bar{width:90px;height:5px;background:var(--line-soft);border-radius:3px;margin-top:6px;overflow:hidden;}
  .section-bar i{display:block;height:100%;background:var(--amber);}
  .chev{color:var(--muted-2);transition:transform .25s;flex:none;}
  .section-board.open .chev{transform:rotate(90deg);}

  .section-body{max-height:0;overflow:hidden;transition:max-height .3s ease;}
  .section-board.open .section-body{max-height:2400px;}
  .ex-list{padding:0 18px 16px;border-top:1px solid var(--line-soft);}
  .ex-row{
    display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line-soft);
  }
  .ex-row:last-child{border-bottom:none;}
  .ex-check{
    flex:none;width:19px;height:19px;border-radius:5px;border:1.5px solid var(--muted-2);
    display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;
  }
  .ex-check.checked{background:var(--green);border-color:var(--green);}
  .ex-check.checked::after{content:"✓";color:#08130D;font-size:12px;font-weight:700;}
  .ex-code{font-family:var(--mono);font-size:10.5px;color:var(--muted-2);flex:none;width:44px;}
  .ex-title{flex:1;font-size:13.5px;min-width:0;}
  .ex-row.done .ex-title{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--line);}
  .ex-xp{font-family:var(--mono);font-size:11.5px;color:var(--amber);flex:none;}

  .ex-row.bonus{margin-top:2px;}
  .ex-row.bonus .ex-code{color:var(--purple);}
  .ex-row.locked{opacity:.4;}
  .ex-row.locked .ex-check{cursor:not-allowed;border-style:dashed;}
  .lock-note{font-size:10.5px;color:var(--muted-2);font-style:italic;margin-left:auto;padding-right:4px;}

  .section-foot{display:flex;justify-content:space-between;align-items:center;padding:10px 18px 4px;}
  .obj-line{font-size:12px;color:var(--muted);max-width:70%;}
  .print-btn{
    font-family:var(--mono);font-size:11px;background:transparent;color:var(--muted);
    border:1px solid var(--line);border-radius:6px;padding:6px 10px;cursor:pointer;white-space:nowrap;
  }
  .print-btn:hover{color:var(--text);border-color:var(--muted);}

  /* ---------- Footer ---------- */
  footer{margin-top:30px;font-size:11.5px;color:var(--muted-2);text-align:center;}
  footer .reset-link{color:var(--muted-2);text-decoration:underline;cursor:pointer;background:none;border:none;font-size:11.5px;font-family:var(--sans);}
  footer .reset-link:hover{color:var(--red);}

  @media (max-width:560px){
    .id-card{grid-template-columns:1fr;justify-items:center;text-align:center;}
    .xp-next{margin-left:0;width:100%;}
    .id-row1{justify-content:center;}
    header.top{flex-direction:column;align-items:flex-start;}
    .top-right{align-items:flex-start;width:100%;}
  }
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important;}
  }

  /* ---------- Print ---------- */
  @media print{
    body{background:#fff !important;color:#111 !important;padding:0;}
    body:not([data-printing]) *{display:none !important;}
    header.top,.id-card,.badges-strip,footer,.print-btn,.section-head .chev,.section-meta{display:none !important;}
    body[data-printing] .wrap{max-width:100%;}
    body[data-printing] .section-board{display:block !important;border:none;margin:0;}
    body[data-printing] .section-board:not(.print-target){display:none !important;}
    body[data-printing] .section-body{max-height:none !important;display:block !important;}
    body[data-printing] .section-head{display:flex !important;padding:0 0 10px;}
    body[data-printing] .section-titles h3{font-size:20px;color:#111;}
    body[data-printing] .section-titles p{color:#444;}
    body[data-printing] .ex-list{border-top:1px solid #ccc;padding:0;display:block !important;}
    body[data-printing] .ex-row{display:flex !important;border-bottom:1px solid #ddd;color:#111;}
    body[data-printing] .ex-title{color:#111 !important;}
    body[data-printing] .ex-check{border-color:#888;}
    body[data-printing] .ex-check.checked{background:#111;border-color:#111;}
    body[data-printing] .ex-xp{color:#111;}
    body[data-printing] .section-foot{display:flex !important;}
    body[data-printing] .obj-line{color:#333;max-width:100%;}
  }
</style>
</head>
<body>
<div class="wrap">

</div>

/* ===================== STATE ===================== */
let completed = new Set();
let selfBadges = new Set();
let LANG = 'tr';

function tt(field){ return field[LANG] ?? field.tr; }
function ui(key){ return UI[LANG][key]; }

/* Storage abstraction: uses the platform's window.storage when this page is
   rendered inside a Claude.ai artifact (persists to your Claude account).
   When opened as a standalone downloaded file, window.storage does not
   exist at all, so we fall back to this browser's localStorage instead —
   that still persists across closes/reopens, just only on this device. */
const usingNativeStorage = (typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function');
const LS_PREFIX = 'ue5_kimlik_';
const Store = {
  async get(key){
    if(usingNativeStorage){
      try{ return await window.storage.get(key); }catch(e){ return null; }
    }
    try{
      const v = window.localStorage.getItem(LS_PREFIX+key);
      return v!==null ? {key, value:v, shared:false} : null;
    }catch(e){ return null; }
  },
  async set(key, value){
    if(usingNativeStorage){
      try{ return await window.storage.set(key, value); }catch(e){ return null; }
    }
    try{
      window.localStorage.setItem(LS_PREFIX+key, value);
      return {key, value, shared:false};
    }catch(e){ return null; }
  }
};

async function loadState(){
  try{
    const r = await Store.get('completed-exercises');
    if(r && r.value) completed = new Set(JSON.parse(r.value));
  }catch(e){}
  try{
    const r2 = await Store.get('self-badges');
    if(r2 && r2.value) selfBadges = new Set(JSON.parse(r2.value));
  }catch(e){}
  try{
    const r3 = await Store.get('user-name');
    document.getElementById('nameInput').value = (r3 && r3.value) ? r3.value : 'İbrahim';
  }catch(e){
    document.getElementById('nameInput').value = 'İbrahim';
  }
  try{
    const r4 = await Store.get('lang');
    if(r4 && (r4.value === 'tr' || r4.value === 'en')) LANG = r4.value;
  }catch(e){}
}
async function saveCompleted(){
  await Store.set('completed-exercises', JSON.stringify([...completed]));
}
async function saveSelfBadges(){
  await Store.set('self-badges', JSON.stringify([...selfBadges]));
}
async function saveName(v){
  await Store.set('user-name', v);
}
async function saveLang(){
  await Store.set('lang', LANG);
}

/* ===================== DERIVED ===================== */
function sectionMandatoryDone(s){ return s.exercises.every(e=>completed.has(e.id)); }
function sectionXP(s){
  let xp=0;
  s.exercises.forEach(e=>{ if(completed.has(e.id)) xp+=e.xp; });
  if(completed.has(s.bonus.id)) xp+=s.bonus.xp;
  return xp;
}
function sectionMaxXP(s){ return s.exercises.reduce((a,e)=>a+e.xp,0) + s.bonus.xp; }
function totalXP(){ return SECTIONS.reduce((a,s)=>a+sectionXP(s),0); }
function currentTierIndex(xp){
  let idx=0;
  RANKS.forEach((r,i)=>{ if(xp>=r.min) idx=i; });
  return idx;
}

/* ===================== BADGE SVG (rank insignia) ===================== */
function tierColor(idx){
  const stops = ['#5B8DEF','#5B8DEF','#7FA8E8','#9C7BE0','#D9A24E','#F2A03D','#F2A03D','#FFD166'];
  return stops[idx] ?? '#F2A03D';
}
function renderBadge(idx){
  const n = idx+1;
  const color = tierColor(idx);
  const legendary = idx===7;
  let chevrons='';
  const startY = 78 - (n-1)*8;
  for(let i=0;i<n;i++){
    const y = startY + i*8.5;
    chevrons += `<polyline points="42,${y+10} 60,${y} 78,${y+10}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="${0.45 + 0.55*((i+1)/n)}"/>`;
  }
  const glow = legendary ? `<circle cx="60" cy="60" r="52" fill="none" stroke="${color}" stroke-width="1" opacity=".35"><animate attributeName="r" values="50;55;50" dur="2.6s" repeatCount="indefinite"/></circle>` : '';
  const star = legendary ? `<path d="M60 20 l3.6 7.4 8.2 1.2-5.9 5.8 1.4 8.2-7.3-3.9-7.3 3.9 1.4-8.2-5.9-5.8 8.2-1.2z" fill="${color}"/>` : '';
  document.documentElement.style.setProperty('--badge-glow', color+'40');
  return `
  <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    ${glow}
    <polygon points="60,10 103,35 103,85 60,110 17,85 17,35" fill="#0F141F" stroke="${color}" stroke-width="2.5"/>
    <polygon points="60,20 95,40 95,80 60,100 25,80 25,40" fill="none" stroke="${color}" stroke-width="1" opacity=".35"/>
    ${chevrons}
    ${star}
  </svg>`;
}

/* ===================== STATIC TEXT (language-dependent, not part of render loop) ===================== */
function applyStaticText(){
  const u = UI[LANG];
  document.title = u.docTitle;
  document.documentElement.lang = LANG;
  document.getElementById('kickerText').textContent = u.kicker;
  document.getElementById('wordmarkText').innerHTML = `${u.wordmarkPrefix}<span>${u.wordmarkAccent}</span>`;
  document.getElementById('topRightText').innerHTML = u.topRight;
  document.getElementById('nameInput').placeholder = u.namePlaceholder;
  document.getElementById('xpMaxText').textContent = u.xpMax;
  document.getElementById('footerIntro').textContent = u.footerIntro;
  document.getElementById('resetBtn').textContent = u.resetBtn;
  document.getElementById('langToggle').textContent = u.langBtn;
}

/* ===================== RENDER ===================== */
function render(){
  const xp = totalXP();
  const tierIdx = currentTierIndex(xp);
  const rank = RANKS[tierIdx];
  const nextRank = RANKS[tierIdx+1];

  document.getElementById('badgeSlot').innerHTML = renderBadge(tierIdx);
  document.getElementById('tierPill').textContent = `RANK ${tierIdx}/7`;
  document.getElementById('rankTitle').textContent = `${rank.icon} ${tt(rank.title)}`;
  document.getElementById('rankDesc').textContent = tt(rank.desc);
  document.getElementById('xpNum').textContent = xp;
  document.getElementById('xpNext').textContent = nextRank
    ? `${ui('nextPrefix')}${tt(nextRank.title)} — ${nextRank.min - xp}${ui('xpLeftSuffix')}`
    : ui('topRank');

  const pct = Math.min(100, (xp/MAX_XP)*100);
  document.getElementById('progFill').style.width = pct+'%';

  const ticksEl = document.getElementById('progTicks');
  ticksEl.innerHTML = TIER_BOUNDS.map(()=> '<i></i>').join('');

  const dotsEl = document.getElementById('tierDots');
  dotsEl.innerHTML = RANKS.map((r,i)=>{
    const cls = i<tierIdx ? 'done' : (i===tierIdx ? 'done current' : '');
    return `<div class="tier-dot ${cls}" title="${tt(r.title)} (${r.min}+ XP)"></div>`;
  }).join('');

  renderBadgesStrip(xp);
  renderSections();

  const noteEl = document.getElementById('storageNote');
  if(noteEl){
    noteEl.textContent = usingNativeStorage ? ui('storageCloud') : ui('storageLocal');
  }
}

function renderBadgesStrip(xp){
  const perfSection = SECTIONS.some(s=> sectionXP(s)===sectionMaxXP(s));
  const fastStart = sectionMandatoryDone(SECTIONS[0]) && sectionMandatoryDone(SECTIONS[1]);
  const architect = sectionXP(SECTIONS[2])===sectionMaxXP(SECTIONS[2]);
  const legend = xp>=MAX_XP;
  const b = ui('badges');

  const chips = [
    {id:'perf', label:b.perf, earned:perfSection, self:false},
    {id:'fast', label:b.fast, earned:fastStart, self:false},
    {id:'arch', label:b.arch, earned:architect, self:false},
    {id:'theo', label:b.theo, earned:selfBadges.has('theo'), self:true},
    {id:'legend', label:b.legend, earned:legend, self:false},
  ];
  document.getElementById('badgesStrip').innerHTML = chips.map(c=>`
    <div class="badge-chip ${c.earned?'earned':''} ${c.self?'self':''}" data-self="${c.self}" data-id="${c.id}" title="${c.self?ui('badgeTooltip'):''}">
      <span class="dot"></span>${c.label}
    </div>`).join('');

  document.querySelectorAll('.badge-chip.self').forEach(el=>{
    el.onclick = ()=>{
      const id = el.dataset.id;
      if(selfBadges.has(id)) selfBadges.delete(id); else selfBadges.add(id);
      saveSelfBadges(); render();
    };
  });
}

let openSections = new Set(['s1']);

function renderSections(){
  const host = document.getElementById('sections');
  host.innerHTML = SECTIONS.map(s=>{
    const xp = sectionXP(s), maxXp = sectionMaxXP(s);
    const pct = Math.round((xp/maxXp)*100);
    const mandDone = sectionMandatoryDone(s);
    const isOpen = openSections.has(s.key);

    const rows = s.exercises.map(e=>{
      const done = completed.has(e.id);
      return `<div class="ex-row ${done?'done':''}">
        <div class="ex-check ${done?'checked':''}" data-id="${e.id}"></div>
        <div class="ex-code">${e.code}</div>
        <div class="ex-title">${tt(e.title)}</div>
        <div class="ex-xp">${e.xp} XP</div>
      </div>`;
    }).join('');

    const bDone = completed.has(s.bonus.id);
    const bonusRow = `<div class="ex-row bonus ${bDone?'done':''} ${mandDone?'':'locked'}">
        <div class="ex-check ${bDone?'checked':''}" data-id="${mandDone? s.bonus.id : ''}"></div>
        <div class="ex-code">${s.bonus.code}</div>
        <div class="ex-title">${tt(s.bonus.title)}</div>
        ${mandDone? '' : `<span class="lock-note">${ui('lockNote')}</span>`}
        <div class="ex-xp">+${s.bonus.xp} XP</div>
      </div>`;

    return `<div class="section-board ${isOpen?'open':''} ${isOpen?'print-target':''}" data-key="${s.key}">
      <div class="section-head" data-toggle="${s.key}">
        <div class="section-icon">${s.icon}</div>
        <div class="section-titles"><h3>${s.code} · ${tt(s.title)}</h3><p>${tt(s.obj)}</p></div>
        <div class="section-meta">
          <div class="section-xp">${xp}/${maxXp} XP</div>
          <div class="section-bar"><i style="width:${pct}%"></i></div>
        </div>
        <div class="chev">▸</div>
      </div>
      <div class="section-body">
        <div class="ex-list">${rows}${bonusRow}</div>
        <div class="section-foot">
          <div class="obj-line">${tt(s.obj)}</div>
          <button class="print-btn" data-print="${s.key}">${ui('printBtn')}</button>
        </div>
      </div>
    </div>`;
  }).join('');

  host.querySelectorAll('.section-head').forEach(el=>{
    el.onclick = ()=>{
      const key = el.dataset.toggle;
      if(openSections.has(key)) openSections.delete(key); else openSections.add(key);
      renderSections();
    };
  });
  host.querySelectorAll('.ex-check').forEach(el=>{
    el.onclick = (ev)=>{
      ev.stopPropagation();
      const id = el.dataset.id;
      if(!id) return;
      if(completed.has(id)) completed.delete(id); else completed.add(id);
      saveCompleted();
      render();
    };
  });
  host.querySelectorAll('.print-btn').forEach(el=>{
    el.onclick = (ev)=>{
      ev.stopPropagation();
      printSection(el.dataset.print);
    };
  });
}

function printSection(key){
  openSections.add(key);
  renderSections();
  document.body.setAttribute('data-printing', key);
  setTimeout(()=>{
    window.print();
  }, 50);
}
window.onafterprint = ()=> document.body.removeAttribute('data-printing');

/* ===================== INIT ===================== */
document.getElementById('resetBtn').onclick = async ()=>{
  if(confirm(ui('resetConfirm'))){
    completed = new Set();
    selfBadges = new Set();
    await saveCompleted();
    await saveSelfBadges();
    render();
  }
};
document.getElementById('nameInput').addEventListener('input', (e)=> saveName(e.target.value));
document.getElementById('langToggle').addEventListener('click', async ()=>{
  LANG = (LANG === 'tr') ? 'en' : 'tr';
  await saveLang();
  applyStaticText();
  render();
});

(async ()=>{
  await loadState();
  applyStaticText();
  render();
})();
</script>
